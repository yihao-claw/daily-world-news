<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 3000px;
  height: 3000px;
  background: linear-gradient(145deg, #0a0a1a 0%, #1a1a3e 40%, #2d1b69 70%, #1a1a3e 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans CJK TC', 'Noto Sans TC', -apple-system, 'SF Pro Display', sans-serif;
  color: white;
  overflow: hidden;
  position: relative;
}

/* Subtle grid pattern */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Glow orbs */
.orb1 {
  position: absolute;
  width: 1200px;
  height: 1200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
  top: -200px;
  right: -300px;
}
.orb2 {
  position: absolute;
  width: 800px;
  height: 800px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%);
  bottom: 200px;
  left: -200px;
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 200px;
}

.icon-text {
  font-size: 320px;
  font-weight: 900;
  margin-bottom: 60px;
  background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #818cf8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 80px rgba(99, 102, 241, 0.6));
  letter-spacing: -10px;
}

.title-zh {
  font-size: 220px;
  font-weight: 800;
  letter-spacing: 20px;
  background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #818cf8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 40px;
}

.title-en {
  font-size: 80px;
  font-weight: 300;
  letter-spacing: 30px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.4);
  margin-bottom: 100px;
}

.tagline {
  font-size: 72px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.6);
  letter-spacing: 8px;
}

.badge {
  display: inline-block;
  margin-top: 80px;
  padding: 24px 60px;
  border: 2px solid rgba(139, 92, 246, 0.4);
  border-radius: 60px;
  font-size: 52px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: 12px;
}
</style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="content">
    <div class="icon-text">AI</div>
    <div class="title-zh">AI 每日新聞</div>
    <div class="title-en">Daily News Digest</div>
    <div class="tagline">國際時事 · 科技趨勢 · AI 播報</div>
    <div class="badge">POWERED BY AI</div>
  </div>
</body>
</html>
